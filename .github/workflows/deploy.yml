name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

jobs:
  build-check:
    name: Build Check (Gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build
        # NODE_ENV=production only for the build step (not for npm ci, which needs devDeps)
        env:
          NEXT_PUBLIC_APP_URL: https://scoopcraft-web-production.up.railway.app
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          NODE_ENV: production
        run: npm run build

  notify-deploy:
    name: Notify Deploy
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Railway Deployment
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          # Trigger deployment via Railway GraphQL API
          # Project: scoopcraft (65180ee5-b26d-495b-8d57-f8bfc7fa4ae9)
          # Service: scoopcraft-web (0171e691-0a93-4c37-8ae3-3949cf0fe5c1)
          # Environment: production (ceb50120-37ff-4a42-8c33-6bfee819fa90)
          RESULT=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query": "mutation { serviceInstanceDeploy(serviceId: \"0171e691-0a93-4c37-8ae3-3949cf0fe5c1\", environmentId: \"ceb50120-37ff-4a42-8c33-6bfee819fa90\") }"}')
          echo "Deploy result: $RESULT"
          if echo "$RESULT" | grep -q '"data"'; then
            echo "Deployment triggered successfully"
          else
            echo "Warning: Deployment may not have triggered. Check Railway dashboard."
            echo "Dashboard: https://railway.app/project/65180ee5-b26d-495b-8d57-f8bfc7fa4ae9"
          fi

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Audit for critical/high vulnerabilities
        # Fail on critical or high; moderate are dev-tool only (esbuild in drizzle-kit/vitest)
        run: npm audit --audit-level=high
        # If this step fails, it means a new critical/high CVE was introduced.
        # Fix by upgrading the offending package before merging/deploying.

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Lint
        run: npm run lint
        continue-on-error: true  # Remove once ESLint config is set up by engineering-manager
      - name: Type Check
        run: npm run typecheck
        continue-on-error: true  # Remove once full Next.js project is initialized

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Run Tests
        run: npm test -- --reporter=verbose
        continue-on-error: true  # Remove once Vitest tests are written by engineering-manager

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: security
    env:
      NEXT_PUBLIC_APP_URL: https://scoopcraft-web-production.up.railway.app
      # Stub values for build-time env vars (real values set in Railway)
      DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
        continue-on-error: true  # Remove once ESLint config is set up by engineering-manager
      - name: Type Check
        run: npm run typecheck
        continue-on-error: true  # Remove once full Next.js project is initialized

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Tests
        run: npm test -- --reporter=verbose
        continue-on-error: true  # Remove once Vitest tests are written by engineering-manager

  build:
    name: Build Check
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: https://scoopcraft-web-production.up.railway.app
      # Stub values for build-time env vars (real values set in Railway)
      DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        continue-on-error: true  # Remove once engineering-manager completes Next.js scaffold

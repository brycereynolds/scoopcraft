name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Run Tests
        run: npm test -- --reporter=verbose

  build:
    name: Build Check
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: https://scoopcraft-web-production.up.railway.app
      # Stub values for build-time env vars (real values set in Railway)
      DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
